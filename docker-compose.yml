services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"

  payment-service:
    build:
      context: ./payment-service
    depends_on:
      - postgres
      - rabbitmq
    environment:
      PAYMENT_DATABASE_URL: postgres://postgres:postgres@postgres:5432/payment_db?sslmode=disable
      PAYMENT_RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      PAYMENT_GRPC_ADDR: ":50051"
      PAYMENT_HTTP_ADDR: ":8081"
    ports:
      - "8081:8081"
      - "50051:50051"

  order-service:
    build:
      context: ./order-service
    depends_on:
      - postgres
      - payment-service
    environment:
      ORDER_DATABASE_URL: postgres://postgres:postgres@postgres:5432/order_db?sslmode=disable
      PAYMENT_GRPC_ADDR: payment-service:50051
      ORDER_GRPC_ADDR: ":50052"
      ORDER_HTTP_ADDR: ":8080"
    ports:
      - "8080:8080"
      - "50052:50052"

  notification-service:
    build:
      context: ./notification-service
    depends_on:
      - postgres
      - rabbitmq
    environment:
      NOTIFICATION_DATABASE_URL: postgres://postgres:postgres@postgres:5432/notification_db?sslmode=disable
      NOTIFICATION_RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      # Optional: set to an order_id value to force BasicNack(false,false) and route to DLQ (bonus demo).
      # NOTIFICATION_DLQ_DEMO_ORDER_ID: "__dlq_demo__"

volumes:
  pgdata:
