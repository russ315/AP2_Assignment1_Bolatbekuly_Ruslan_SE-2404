syntax = "proto3";

package order.v1;

import "google/protobuf/timestamp.proto";

option go_package = "ap2/order-service/internal/transport/grpc/proto/order/v1;orderv1";

service OrderService {
  rpc SubscribeToOrderUpdates(OrderRequest) returns (stream OrderStatusUpdate);
}

message OrderRequest {
  string order_id = 1;
}

message OrderStatusUpdate {
  string order_id = 1;
  string customer_id = 2;
  string item_name = 3;
  int64 amount = 4;
  string status = 5;
  google.protobuf.Timestamp updated_at = 6;
}

message Order {
  string id = 1;
  string customer_id = 2;
  string item_name = 3;
  int64 amount = 4; // Amount in cents
  string status = 5;
  google.protobuf.Timestamp created_at = 6;
}
